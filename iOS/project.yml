name: Napwatch
options:
  bundleIdPrefix: com.shimondeitel.napwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Napwatch:
    type: application
    platform: iOS
    sources:
      - path: Napwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.napwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Napwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NapwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NapwatchTests
      - path: Napwatch.storekit
    dependencies:
      - target: Napwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.napwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NapwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NapwatchUITests
    dependencies:
      - target: Napwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.napwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Napwatch:
    build:
      targets:
        Napwatch: all
        NapwatchTests: [test]
        NapwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Napwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Napwatch.storekit
      targets:
        - NapwatchTests
        - NapwatchUITests
    archive:
      config: Release
